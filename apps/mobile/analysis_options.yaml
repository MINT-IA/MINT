include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - archive/**
  # Temporary baseline debt suppression:
  # keep analyzer signal focused on production blockers while legacy cleanup
  # is still in progress across old screens/tests.
  errors:
    deprecated_member_use: ignore
    deprecated_member_use_from_same_package: ignore
    no_leading_underscores_for_local_identifiers: ignore
    curly_braces_in_flow_control_structures: ignore
    prefer_final_fields: ignore
    prefer_const_literals_to_create_immutables: ignore
    unused_import: ignore
    unused_element: ignore
    unnecessary_brace_in_string_interps: ignore
    unused_local_variable: ignore
    unnecessary_to_list_in_spreads: ignore
    constant_identifier_names: ignore
    use_build_context_synchronously: ignore
    unnecessary_string_interpolations: ignore
    unnecessary_string_escapes: ignore
    unnecessary_non_null_assertion: ignore
    unnecessary_import: ignore
    sort_child_properties_last: ignore
    prefer_null_aware_operators: ignore
    prefer_interpolation_to_compose_strings: ignore
    prefer_function_declarations_over_variables: ignore

linter:
  rules:
    # Disabled temporarily until full baseline cleanup is done.
    prefer_const_constructors: false
    prefer_const_declarations: false
    avoid_print: false
