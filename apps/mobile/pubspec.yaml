name: mint_mobile
description: Mint - Financial mentor mobile app
publish_to: 'none'

version: 1.0.0+12

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  provider: ^6.1.1
  go_router: ^13.2.0
  intl: ^0.19.0
  url_launcher: ^6.2.0
  google_fonts: ^6.1.0
  uuid: ^4.0.0
  pdf: ^3.10.8
  printing: ^5.12.0
  fl_chart: ^0.70.0
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.0.0
  file_picker: ^8.0.0
  in_app_purchase: ^3.2.0
  in_app_purchase_platform_interface: ^1.4.0
  confetti: ^0.7.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  generate: true
  uses-material-design: true
  
  # Assets
  assets:
    - assets/config/pillar_3a_limits.json
    - assets/config/tax_scales.json
    - assets/config/tax_scales_2024.json
    - assets/config/personas.json
    - assets/config/commune_multipliers.json
