name: mint_mobile
description: Mint - Financial mentor mobile app
publish_to: 'none'

version: 2.2.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  provider: ^6.1.1
  go_router: ^13.2.0
  intl: any  # Pinned by flutter_localizations SDK — do not constrain further
  url_launcher: ^6.2.0
  google_fonts: ^6.3.3  # 6.3.3+ required for Dart 3.11 / Flutter 3.41 (FontWeight const map fix)
  uuid: ^4.0.0
  pdf: ^3.10.8
  printing: ^5.12.0
  fl_chart: ^0.70.0
  flutter_markdown: ^0.7.6
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.0.0
  sentry_flutter: ^8.0.0
  file_picker: ^8.0.0
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.15.0
  in_app_purchase: ^3.2.0
  in_app_purchase_platform_interface: ^1.4.0
  confetti: ^0.7.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1
  flutter_gemma: ^0.11.16
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0
  sign_in_with_apple: ^6.1.0
  crypto: ^3.0.3
  sqflite_sqlcipher: ^3.1.0+1
  path_provider: ^2.1.0
  path: ^1.9.0  # pinned by integration_test from SDK

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  generate: true
  uses-material-design: true
  
  # Assets
  assets:
    # Phase 6 — L1.4 Regional voice ARBs (loaded at runtime by
    # lib/l10n_regional/regional_localizations_delegate.dart).
    - lib/l10n_regional/app_regional_vs.arb
    - lib/l10n_regional/app_regional_zh.arb
    - lib/l10n_regional/app_regional_ti.arb
    - assets/config/pillar_3a_limits.json
    - assets/config/tax_scales.json
    - assets/config/tax_scales_2024.json
    - assets/config/personas.json
    - assets/config/commune_multipliers.json
