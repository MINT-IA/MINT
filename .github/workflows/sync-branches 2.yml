# Sync branches after promotion merges
# After staging‚Üímain merge: fast-forward staging & dev to main
# After dev‚Üístaging merge: fast-forward dev to staging
#
# Uses GITHUB_TOKEN (automatic) ‚Äî requires "Allow GitHub Actions to
# create and approve pull requests" enabled in repo Settings > Actions.

name: Sync branches

on:
  push:
    branches: [main, staging]

jobs:
  sync:
    name: Fast-forward downstream branches
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ‚îÄ‚îÄ Push to main triggered (staging‚Üímain merge) ‚îÄ‚îÄ
      - name: Sync staging ‚Üê main
        if: github.ref == 'refs/heads/main'
        run: |
          git checkout staging
          git merge --ff-only origin/main || echo "::warning::Cannot fast-forward staging to main ‚Äî manual merge needed"
          git push origin staging || echo "::warning::Push staging failed ‚Äî check branch protection"

      - name: Sync dev ‚Üê main
        if: github.ref == 'refs/heads/main'
        run: |
          git checkout dev
          git merge --ff-only origin/main || echo "::warning::Cannot fast-forward dev to main ‚Äî manual merge needed"
          git push origin dev || echo "::warning::Push dev failed ‚Äî check branch protection"

      # ‚îÄ‚îÄ Push to staging triggered (dev‚Üístaging merge) ‚îÄ‚îÄ
      - name: Sync dev ‚Üê staging
        if: github.ref == 'refs/heads/staging'
        run: |
          git checkout dev
          git merge --ff-only origin/staging || echo "::warning::Cannot fast-forward dev to staging ‚Äî manual merge needed"
          git push origin dev || echo "::warning::Push dev failed ‚Äî check branch protection"
