# MINT CI — Run tests on every push & PR
# Triggers on push to staging/main + PRs targeting dev/staging/main
# Smart path detection: only runs backend/flutter jobs when relevant files changed.
# Saves ~5-8 min per run when only one side is modified.

name: CI

on:
  push:
    branches: [dev, staging, main]
  pull_request:
    branches: [dev, staging, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Detect which paths changed ─────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      flutter: ${{ steps.filter.outputs.flutter }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3
        id: filter
        with:
          filters: |
            backend:
              - 'services/backend/**'
              - 'tools/openapi/**'
            flutter:
              - 'apps/mobile/**'

  # ─── Contracts drift guard (VoiceCursorContract codegen) ─────
  # Regenerates Dart + Python contract consumers from tools/contracts/voice_cursor.json
  # and fails the build if anything drifted. Runs BEFORE backend/flutter for fail-fast.
  contracts-drift:
    name: Contracts drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Regenerate contract consumers
        run: bash tools/contracts/regenerate.sh
      - name: Fail on drift
        run: |
          if ! git diff --exit-code \
              tools/contracts/ \
              apps/mobile/lib/services/voice/voice_cursor_contract.g.dart \
              services/backend/app/schemas/voice_cursor.py; then
            echo "::error::Contracts drift detected — run 'bash tools/contracts/regenerate.sh' and commit."
            exit 1
          fi

  # ─── Phase 10 Plan 10-03 / ACCESS-06: onboarding readability gate ───
  # Pure-Dart Kandel–Moles French readability check on the onboarding
  # surfaces (intent screen + landing v2 + intent chips). Fails the build
  # if any scoreable string drops below K–M 50 (B1 floor). Pre-existing
  # legacy keys (landingFeature*, onboardingStep*) are out of scope —
  # scoring targets only the new 2-screen golden path.
  #
  # Runs on every change to apps/mobile/** or tools/checks/flesch_kincaid_fr.dart.
  # Lives in its own job so a readability regression fails fast (no
  # 10-minute wait for the full Flutter shard matrix).
  readability:
    name: Onboarding readability (ACCESS-06)
    needs: [changes]
    if: needs.changes.outputs.flutter == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2
        with:
          flutter-version: '3.41.4'
          cache: true
      - name: Flesch–Kincaid (Kandel–Moles) French gate
        run: |
          dart run tools/checks/flesch_kincaid_fr.dart \
            apps/mobile/lib/l10n/app_fr.arb \
            --keys-prefix=intentScreen,intentChip,landingV2 \
            --min=50 \
            --min-words=8

  # ─── Phase 12 Plan 12-02 / ACCESS-03 / D-04: WCAG 2.1 AA gate ───
  # Two-layer floor gate on every v2.2-touched UI surface:
  #   1. Python hardcoded-color scanner (tools/checks/wcag_aa_all_touched.py)
  #      catches raw Color(0xFF...) literals in text contexts that fall
  #      below WCAG AA 4.5:1 against craie/white.
  #   2. Dart meetsGuideline widget test
  #      (test/accessibility/wcag_aa_all_touched_test.dart) asserts
  #      textContrastGuideline + android/iOS tap target guidelines on
  #      9 representative v2.2 surface scaffolds.
  #
  # Complements (does NOT replace) the strict S0–S5 AAA gate at
  # test/theme/aaa_tokens_contrast_test.dart.
  wcag-aa-all-touched:
    name: WCAG AA all touched surfaces (ACCESS-03)
    needs: [changes]
    if: needs.changes.outputs.flutter == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python WCAG AA hardcoded-color gate
        run: python3 tools/checks/wcag_aa_all_touched.py
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2
        with:
          flutter-version: '3.41.4'
          cache: true
      - name: Install Flutter dependencies
        working-directory: apps/mobile
        run: flutter pub get
      - name: Generate l10n
        working-directory: apps/mobile
        run: flutter gen-l10n
      - name: Dart meetsGuideline AA all-touched-surfaces test
        working-directory: apps/mobile
        run: flutter test test/accessibility/wcag_aa_all_touched_test.dart

  # ─── Backend Tests ───────────────────────────────────────────
  backend:
    name: Backend tests
    needs: [changes, contracts-drift]
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: services/backend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for diff-cover on PRs

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/backend/pyproject.toml

      - name: Install dependencies (app + dev/test)
        run: pip install ".[dev]" pytest-cov diff-cover

      - name: Security audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --skip-editable --desc on --ignore-vuln CVE-2026-4539

      - name: Legacy token gate (no chiffre_choc)
        working-directory: ${{ github.workspace }}
        run: python3 tools/checks/no_chiffre_choc.py

      # ─── Phase 8a / MTC-11, MTC-12: no legacy confidence render ─────
      - name: No legacy confidence render (Phase 8a gate)
        working-directory: ${{ github.workspace }}
        run: python3 tools/checks/no_legacy_confidence_render.py

      # ─── Phase 12 / PERF-05: no implicit BloomStrategy on MTC ──────
      - name: No implicit BloomStrategy on MTC (PERF-05)
        working-directory: ${{ github.workspace }}
        run: python3 tools/checks/no_implicit_bloom_strategy.py

      # ─── Phase 8a / TRUST-02 + Phase 9 / ALERT-02: sentence-subject ARB lint ─
      - name: ARB sentence-subject lint (TRUST-02 + ALERT-02)
        working-directory: ${{ github.workspace }}
        run: python3 tools/checks/sentence_subject_arb_lint.py

      # ─── Phase 9 / ALERT-07: no LLM-driven alert objects ────────────
      - name: No LLM-driven alert objects (ALERT-07)
        working-directory: ${{ github.workspace }}
        run: python3 tools/checks/no_llm_alert.py

      # ─── Phase 6 / REGIONAL-05: no legacy REGIONAL_MAP ──────────
      - name: No legacy REGIONAL_MAP (REGIONAL-05)
        working-directory: ${{ github.workspace }}
        run: |
          # Match only actual assignments (top-of-line), not doc/comment
          # mentions. Aligned with tools/ship_gate/run_all_gates_v2_2.sh
          # item [17] to keep a single source of truth.
          if git grep -nE '^[[:space:]]*REGIONAL_MAP[[:space:]]*=' services/backend/app/; then
            echo "::error::REGIONAL-05 violation: legacy REGIONAL_MAP reintroduced in services/backend/"
            exit 1
          fi
          if git grep -nE '^[[:space:]]*_REGIONAL_IDENTITY[[:space:]]*=' services/backend/app/; then
            echo "::error::REGIONAL-05 violation: legacy _REGIONAL_IDENTITY reintroduced in services/backend/app/"
            exit 1
          fi

      # ─── Phase 6 / REGIONAL-04: regional microcopy codegen drift ──
      - name: Regional microcopy codegen drift
        working-directory: ${{ github.workspace }}
        run: python3 tools/checks/regional_microcopy_drift.py

      # ─── Phase 7 / LAND-01, LAND-04: landing v2 calm-promise gates ──
      - name: Landing v2 — no numbers / banned terms (LAND-04)
        working-directory: ${{ github.workspace }}
        run: python3 tools/checks/landing_no_numbers.py

      - name: Landing v2 — no financial_core imports (LAND-01)
        working-directory: ${{ github.workspace }}
        run: python3 tools/checks/landing_no_financial_core.py

      - name: Run tests
        env:
          TESTING: "1"
          DATABASE_URL: "sqlite:///./test.db"
        run: python -m pytest tests/ -q --tb=short -x --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=60

      - name: Changed-lines coverage (PRs only, ≥80%)
        if: github.event_name == 'pull_request'
        working-directory: .
        run: diff-cover services/backend/coverage.xml --compare-branch=origin/${{ github.base_ref }} --fail-under=80

      - name: OpenAPI contract check
        env:
          TESTING: "1"
          DATABASE_URL: "sqlite:///./test.db"
        run: |
          python ../../tools/openapi/generate_canonical.py
          if git diff --exit-code ../../tools/openapi/mint.openapi.canonical.json; then
            echo "OpenAPI spec is up to date."
          else
            echo "OpenAPI spec has drifted."
            echo "OpenAPI drift preview:"
            git --no-pager diff -- ../../tools/openapi/mint.openapi.canonical.json | sed -n '1,220p'
            echo "OPENAPI_CHANGED=true" >> "$GITHUB_ENV"
          fi

      - name: Auto-commit OpenAPI spec (push to main only)
        if: env.OPENAPI_CHANGED == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: .
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/openapi/mint.openapi.canonical.json
          git commit -m "chore(ci): auto-regenerate OpenAPI canonical spec" || echo "No changes to commit"
          git push || echo "Push failed (branch protection) — OpenAPI spec will be committed manually"

      - name: Fail on drift (PRs only)
        if: env.OPENAPI_CHANGED == 'true' && github.event_name == 'pull_request'
        run: |
          echo "::error::OpenAPI spec has changed. Regenerate and commit before merging."
          exit 1

      - name: Alembic migration check
        env:
          TESTING: "1"
          DATABASE_URL: "sqlite:///./test_migration.db"
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head
          rm -f test_migration.db

  # ─── Flutter Analysis & Tests (3-shard parallel) ────────────
  #
  # Sharding strategy: split ~365 test files across 3 parallel runners.
  # Each shard runs `flutter test` on a disjoint subset of test directories.
  #   - services: test/services/ + test/simulators/ + test/financial_core/ + test/domain/ + test/b2b/  (~200 files)
  #   - widgets:  test/widgets/ + test/models/ + test/providers/                                       (~85 files)
  #   - screens:  test/screens/ + test/golden/ + test/auth/ + test/modules/
  #               + test/journeys/ + test/accessibility/ + test/i18n/                                  (~55 files)
  #
  # NOTE: test/patrol/ is intentionally excluded — requires emulator infrastructure.
  # NOTE: test/golden_screenshots/ is intentionally excluded — pixel diffs are
  #       cross-platform fragile (Mac baselines fail on Linux CI). Run locally
  #       before each release. See test/golden_screenshots/README.md.
  # See .github/workflows/patrol.md for manual gate policy.
  #
  # `flutter analyze` runs only in the services shard to avoid redundant work.
  # All shards exclude test/_archive/ (legacy suite).
  # --concurrency=4 parallelizes test execution within each shard.
  #
  flutter:
    name: Flutter ${{ matrix.shard }}
    needs: [changes, contracts-drift]
    if: needs.changes.outputs.flutter == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [services, widgets, screens]
        include:
          - shard: services
            test_dirs: "test/services/ test/simulators/ test/financial_core/ test/domain/ test/b2b/"
            run_analyze: true
          - shard: widgets
            test_dirs: "test/widgets/ test/models/ test/providers/"
            run_analyze: false
          - shard: screens
            test_dirs: "test/screens/ test/golden/ test/auth/ test/modules/ test/journeys/ test/accessibility/ test/i18n/"
            run_analyze: false
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2
        with:
          flutter-version: '3.41.4'  # matches local dev; AppDelegate.swift uses FlutterImplicitEngineDelegate (3.41+)
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Patch google_fonts for Dart compatibility
        run: bash scripts/patch_google_fonts_const_map.sh

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Analyze (errors only)
        if: matrix.run_analyze
        shell: bash
        run: |
          set +e
          flutter analyze --no-fatal-warnings --no-fatal-infos > /tmp/flutter_analyze.log 2>&1

          errors=$(grep -cE "^[[:space:]]*error[[:space:]]+•" /tmp/flutter_analyze.log || true)
          warnings=$(grep -cE "^[[:space:]]*warning[[:space:]]+•" /tmp/flutter_analyze.log || true)
          infos=$(grep -cE "^[[:space:]]*info[[:space:]]+•" /tmp/flutter_analyze.log || true)
          echo "Analyze summary: errors=$errors warnings=$warnings infos=$infos"

          echo "Analyze diagnostics (warnings/errors only):"
          grep -E "^[[:space:]]*(error|warning)[[:space:]]+•" /tmp/flutter_analyze.log || true
          grep -E "issues found" /tmp/flutter_analyze.log || true

          # Fail only on actual errors — infos and warnings are logged but not blocking
          if [[ "$errors" -gt 0 ]]; then
            echo "::error::Flutter analyze found $errors error(s)"
            sed -n '1,120p' /tmp/flutter_analyze.log
            exit 1
          fi
          echo "Analyze passed (0 errors, $warnings warnings, $infos infos)"

      - name: Run tests (${{ matrix.shard }} shard)
        shell: bash
        run: |
          echo "Running Flutter tests — shard: ${{ matrix.shard }}"
          echo "Test directories: ${{ matrix.test_dirs }}"
          # Collect test files from shard directories, excluding _archive
          # Also include root-level test/*.dart files in the services shard
          {
            find ${{ matrix.test_dirs }} -name '*_test.dart' -not -path 'test/_archive/*' -print0
            if [ "${{ matrix.shard }}" = "services" ]; then
              find test/ -maxdepth 1 -name '*_test.dart' -print0
            fi
          } | sort -z \
            | xargs -0 flutter test --concurrency=4 --reporter compact

      # ─── Golden test gate (Plan 04-03) ────────────────────────────
      # Runs ONLY on the services shard to avoid triple-execution.
      # Scope: test/goldens/helpers/ unit tests only (they pin the
      # screen_pump helper's public surface: device dimensions, view
      # wiring, locale wiring, MediaQuery flags).
      #
      # The image-diff goldens under test/goldens/*.dart are tagged
      # `local-only` and intentionally NOT run here. Flutter pixel
      # goldens are cross-platform fragile (macOS masters drift on
      # Linux CI due to font hinting + glyph rasterization), same
      # policy that already excludes test/golden_screenshots/. They
      # are executed locally by Julien before each release and the
      # Galaxy A14 subset is a manual device gate per PERF-04.
      #
      # See apps/mobile/test/goldens/README.md for the full CI scope
      # decision, local-run commands, and the un-skip protocol for
      # S4 goldens once Plan 04-02 lands.
      - name: Golden helper tests (Plan 04-03 CI subset)
        if: matrix.shard == 'services'
        shell: bash
        run: |
          echo "Running golden helper unit tests (CI-safe subset)"
          flutter test test/goldens/helpers/ --reporter compact

  # ─── Gate: all checks must pass ──────────────────────────────
  ci-gate:
    name: CI Gate
    needs: [changes, backend, flutter, readability, wcag-aa-all-touched]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          # Skip check if job was skipped (no relevant changes)
          backend="${{ needs.backend.result }}"
          flutter="${{ needs.flutter.result }}"
          readability="${{ needs.readability.result }}"
          wcag="${{ needs.wcag-aa-all-touched.result }}"
          [[ "$backend" == "skipped" ]] && backend="success"
          [[ "$flutter" == "skipped" ]] && flutter="success"
          [[ "$readability" == "skipped" ]] && readability="success"
          [[ "$wcag" == "skipped" ]] && wcag="success"
          if [[ "$backend" != "success" ]] || [[ "$flutter" != "success" ]] || [[ "$readability" != "success" ]] || [[ "$wcag" != "success" ]]; then
            echo "CI failed — backend=${{ needs.backend.result }}, flutter=${{ needs.flutter.result }}, readability=${{ needs.readability.result }}, wcag=${{ needs.wcag-aa-all-touched.result }}"
            exit 1
          fi
          echo "All checks passed"
