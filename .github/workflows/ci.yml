# MINT CI — Run tests on every push & PR
# Triggers on push to main + any PR
# Two parallel jobs: backend (pytest) + flutter (analyze + test)
# REQUIRED to pass before merge (branch protection rule)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend Tests ───────────────────────────────────────────
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          TESTING: "1"
          DATABASE_URL: "sqlite:///./test.db"
        run: python -m pytest tests/ -q --tb=short

  # ─── Flutter Analysis & Tests ────────────────────────────────
  flutter:
    name: Flutter analyze + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Analyze (must be 0 errors)
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Run tests
        run: flutter test

  # ─── Gate: all checks must pass ──────────────────────────────
  ci-gate:
    name: CI Gate
    needs: [backend, flutter]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.backend.result }}" != "success" ]] || \
             [[ "${{ needs.flutter.result }}" != "success" ]]; then
            echo "CI failed — backend=${{ needs.backend.result }}, flutter=${{ needs.flutter.result }}"
            exit 1
          fi
          echo "All checks passed"
