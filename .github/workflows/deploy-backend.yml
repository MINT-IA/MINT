# MINT Backend — Deploy to Railway
# Two environments: staging (on PR) + production (on push to main)
#
# Required secrets:
#   RAILWAY_TOKEN          — Railway API token
#   RAILWAY_SERVICE_ID     — Production service ID
#   RAILWAY_STAGING_SERVICE_ID — Staging service ID (optional)

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "services/backend/**"
  pull_request:
    branches: [main]
    paths:
      - "services/backend/**"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Tests must pass first ──────────────────────────────────
  test:
    name: Pre-deploy tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/backend/pyproject.toml

      - name: Install dependencies (app + dev/test deps)
        run: pip install ".[dev]"

      - name: Run tests
        env:
          TESTING: "1"
          DATABASE_URL: "sqlite:///./test.db"
        run: python -m pytest tests/ -q --tb=short -x

  # ─── Deploy to staging (on PR) ─────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Check Railway config
        env:
          HAS_TOKEN: ${{ secrets.RAILWAY_TOKEN != '' }}
        run: |
          if [ "$HAS_TOKEN" != "true" ]; then
            echo "::notice::Railway secrets not configured yet — skipping deploy"
            echo "SKIP_DEPLOY=true" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: env.SKIP_DEPLOY != 'true'

      - name: Install Railway CLI
        if: env.SKIP_DEPLOY != 'true'
        run: npm install -g @railway/cli

      - name: Deploy to staging
        if: env.SKIP_DEPLOY != 'true'
        id: deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service ${{ secrets.RAILWAY_STAGING_SERVICE_ID }} --detach
          echo "Deployed to staging"

  # ─── Deploy to production (on push to main) ────────────────
  deploy-production:
    name: Deploy to Production
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://mint-api.up.railway.app
    steps:
      - name: Check Railway config
        env:
          HAS_TOKEN: ${{ secrets.RAILWAY_TOKEN != '' }}
        run: |
          if [ "$HAS_TOKEN" != "true" ]; then
            echo "::notice::Railway secrets not configured yet — skipping deploy"
            echo "SKIP_DEPLOY=true" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: env.SKIP_DEPLOY != 'true'

      - name: Install Railway CLI
        if: env.SKIP_DEPLOY != 'true'
        run: npm install -g @railway/cli

      - name: Deploy to production
        if: env.SKIP_DEPLOY != 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} --detach
          echo "Deployed to production"
