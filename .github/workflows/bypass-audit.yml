# .github/workflows/bypass-audit.yml — Phase 34 GUARD-07 D-21/D-22.
#
# Secondary awareness tool for LEFTHOOK_BYPASS usage patterns on `dev`.
# PRIMARY ground-truth for bypass-induced regressions:
# .github/workflows/lefthook-ci.yml (D-24, Plan 34-07) — that job re-runs
# all lints on every PR and fails loud on regressions.
#
# This job greps commit bodies on `dev` for `LEFTHOOK_BYPASS` and
# `[bypass:` markers over the last 7 days and opens a
# `bypass-audit`-labelled issue if the count exceeds 3 (D-22 threshold).
# Manual triage — no bot auto-fix.
#
# Idempotency: if an open `bypass-audit` issue already exists for the
# current week, the job appends a comment rather than opening a
# duplicate (prevents noise on Monday-then-push-to-dev firings).
#
# The workflow itself always exits 0 — it's alerting, not gating.
#
# Scheduled Monday 09:00 UTC + post-merge to dev per D-21.
name: Bypass audit (GUARD-07)

on:
  schedule:
    # Monday 09:00 UTC per D-21
    - cron: '0 9 * * 1'
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: Count bypass signals in last 7 days
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Count bypass signals in commit bodies on dev (7d window)
        id: count
        run: |
          # Phase 34.1 Fix #2: extend regex to cover ALL known bypass vectors,
          # not just LEFTHOOK_BYPASS. Closes P0 gap from audits/01-ADVERSARIAL.md
          # (LEFTHOOK=0 / LEFTHOOK_EXCLUDE / LEFTHOOK_RUN_ONLY / core.hooksPath /
          # --no-verify were all invisible to the original regex).
          # --no-verify / core.hooksPath leave no trace unless mentioned in
          # commit body — grepping is still worth doing for voluntary mentions.
          git fetch origin dev --depth=0 2>/dev/null || true
          count=$(git log --since="7 days ago" --pretty=%B origin/dev 2>/dev/null \
            | grep -c -E 'LEFTHOOK_BYPASS|LEFTHOOK=0|LEFTHOOK_EXCLUDE=|LEFTHOOK_RUN_ONLY=|core\.hooksPath|--no-verify|\[bypass:' || true)
          echo "count=${count}" >> "$GITHUB_OUTPUT"
          echo "[bypass-audit] Found ${count} bypass signal(s) on dev (7d window)"

      - name: Collect commit hashes for triage body (only if threshold exceeded)
        id: commits
        if: ${{ fromJSON(steps.count.outputs.count) > 3 }}
        run: |
          # Phase 34.1 Fix #2: same extended regex as step `count`.
          triage=$(git log --since="7 days ago" --pretty='- %h %an — %s' origin/dev \
            | grep -E 'LEFTHOOK_BYPASS|LEFTHOOK=0|LEFTHOOK_EXCLUDE=|LEFTHOOK_RUN_ONLY=|core\.hooksPath|--no-verify|\[bypass:' || true)
          {
            echo 'triage<<TRIAGE_EOF'
            printf '%s\n' "${triage:-(no commits matched the regex in git log subject lines — inspect bodies manually)}"
            echo 'TRIAGE_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update bypass-audit issue if threshold exceeded
        if: ${{ fromJSON(steps.count.outputs.count) > 3 }}
        uses: actions/github-script@v7
        env:
          # Phase 34.1 Fix #2: pass outputs via env to avoid
          # template-literal injection (commit subjects/author names are
          # untrusted). Closes P2 from audits/04-CI-WORKFLOWS.md.
          COUNT: ${{ steps.count.outputs.count }}
          TRIAGE: ${{ steps.commits.outputs.triage }}
        with:
          script: |
            const count = process.env.COUNT;
            const triage = process.env.TRIAGE;
            const weekTag = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
            const title = `bypass-audit: ${count} LEFTHOOK_BYPASS references (week of ${weekTag})`;

            const body = [
              `Weekly audit (GUARD-07 D-21) detected **${count} commits** with`,
              `\`LEFTHOOK_BYPASS\` or \`[bypass:\` markers on \`dev\` in the last 7`,
              `days (threshold=3 per CONTEXT.md D-22).`,
              ``,
              `**Commits flagged:**`,
              ``,
              triage,
              ``,
              `**Manual triage command:**`,
              ``,
              '```bash',
              'git log --since="7 days ago" --grep="LEFTHOOK_BYPASS\\|\\[bypass:" origin/dev',
              '```',
              ``,
              `**Note:** this audit is a secondary awareness tool. The primary`,
              `ground-truth bypass detector is \`.github/workflows/lefthook-ci.yml\``,
              `(GUARD-07 D-24, Plan 34-07) which re-runs all lints on every PR.`,
              `If that job passes on the PRs in question, the bypasses did not`,
              `introduce regressions — only the usage pattern is being flagged`,
              `here for maintainer awareness.`,
            ].join('\n');

            // Idempotency: comment on an existing open bypass-audit issue
            // rather than open a duplicate when both triggers fire in a week.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bypass-audit',
              per_page: 10,
            });

            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `**Audit re-fired ${weekTag}** — count now **${count}** (threshold 3).\n\n${triage}`,
              });
              core.info(`[bypass-audit] appended comment to existing issue #${issue.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                labels: ['bypass-audit'],
                body: body,
              });
              core.info(`[bypass-audit] opened issue #${created.data.number} — count=${count}`);
            }
