# .github/workflows/lefthook-ci.yml — Phase 34 GUARD-07 D-24 + GUARD-08 D-24
#
# PRIMARY ground-truth detector for lefthook bypasses that introduced a
# regression. Complements `.github/workflows/bypass-audit.yml` (D-21), which
# tracks bypass USAGE PATTERNS; this workflow catches any bypass whose
# EFFECT a lint would have blocked, by re-running all lints on the PR range
# inside a fresh ubuntu-latest worktree.
#
# Per RESEARCH §Pitfall 6: `LEFTHOOK_BYPASS=1` is runtime-only and leaves
# no trace on the commit object. The only 100%-reliable detection of
# bypass-induced regressions is re-running the hooks in CI on a clean
# checkout — that is what this workflow does.
#
# Also catches the less-documented case: any contributor who used
# `--no-verify` locally (CONTRIBUTING §3 forbids it) — their commits would
# land without lefthook ever firing, but this CI job will flag the
# regression before merge because it runs lefthook on the PR range.
name: Lefthook CI (GUARD-07 D-24 / GUARD-08 D-24)

on:
  pull_request:
    branches: [dev, staging, main]

jobs:
  lefthook-all:
    name: Re-run lefthook on PR range
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Phase 34.1 Fix #1: prevent iCloud-style stalls
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lefthook 2.1.6 (pinned — matches local min_version)
        # Phase 34.2 hotfix: install.sh at v2.1.6 tag returns 404 (upstream removed
        # that path from tagged releases). Switch to npm which publishes a pinned
        # binary distribution and fails loudly if the version is unavailable.
        run: |
          set -euo pipefail
          npm install -g lefthook@2.1.6
          lefthook version

      - name: Confirm lefthook installed + config parses
        # Phase 34.1 Fix #1: replace bogus `lefthook validate` (not a 2.x subcommand).
        # `lefthook dump` expands the full config — fails on invalid YAML or schema errors.
        run: |
          lefthook version
          lefthook dump > /dev/null

      - name: Run pre-commit hooks over PR range (--all-files --force)
        # --all-files: full-repo pass to catch bypass-introduced state.
        # --force: don't skip when lefthook thinks files haven't changed.
        # This is the expensive pass (~1-3 min on a big repo) but it's the
        # only way to guarantee no bypassed-commit regression slipped in.
        run: lefthook run pre-commit --all-files --force

      - name: Run proof_of_read against each new commit in PR range
        # Phase 34.1 Fix #1: invoke the underlying script directly with the
        # message file as positional arg (was `lefthook run commit-msg --file <path>`
        # which is NOT a valid lefthook 2.x invocation — --file flag does not
        # exist, commit-msg hook expects positional {1}). Calling the script
        # directly is equivalent to what lefthook would dispatch internally,
        # and works on any runner that has python3.
        run: |
          set -euo pipefail
          commits=$(git log --format=%H "origin/${{ github.base_ref }}..HEAD")
          if [ -z "$commits" ]; then
            echo "No new commits in PR range — nothing to check."
            exit 0
          fi
          echo "$commits" | while read sha; do
            if [ -z "$sha" ]; then continue; fi
            git log -1 --format=%B "$sha" > /tmp/msg.txt
            if ! python3 tools/checks/proof_of_read.py /tmp/msg.txt; then
              echo "::error sha=$sha::proof-of-read check failed on this commit"
              exit 1
            fi
          done
