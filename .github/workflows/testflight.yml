# MINT iOS — Build + Upload to TestFlight
#
# Two tracks:
#   - staging: builds from staging branch, points to staging API (internal testing)
#   - production: builds from main branch, points to production API (beta testers)
#
# Manual-only (workflow_dispatch) to save macOS minutes (10x multiplier).
# Usage:
#   gh workflow run TestFlight -f environment=staging
#   gh workflow run TestFlight -f environment=production
#
# Required GitHub Secrets:
#   APP_STORE_CONNECT_API_KEY_ID
#   APP_STORE_CONNECT_ISSUER_ID
#   APP_STORE_CONNECT_API_KEY_CONTENT  (base64-encoded .p8 file)
#   MATCH_GIT_URL                      (private repo for certs)
#   MATCH_PASSWORD                     (decrypt certs)
#
# Required GitHub Vars (per environment):
#   STAGING_API_URL                    (e.g. https://mint-staging.up.railway.app/api/v1)
#   PROD_API_URL                       (e.g. https://api.mint.ch/api/v1)
#
# Optional:
#   HUGGINGFACE_TOKEN                  (required for gated Gemma 3n download)
#   SLM_MODEL_URL                      (custom model URL override)

name: TestFlight

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: testflight-${{ github.event.inputs.environment }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    name: "Build iOS + Upload TestFlight (${{ github.event.inputs.environment }})"
    runs-on: macos-15
    timeout-minutes: 45
    environment:
      name: ${{ github.event.inputs.environment }}

    defaults:
      run:
        working-directory: apps/mobile

    steps:
      # ── Resolve API URL + branch from environment input ──
      # Note: these steps run BEFORE checkout, so override working-directory
      - name: Resolve environment config
        id: env-config
        working-directory: .
        run: |
          if [ "${{ github.event.inputs.environment }}" = "staging" ]; then
            echo "branch=staging" >> "$GITHUB_OUTPUT"
            echo "api_url=${{ vars.STAGING_API_URL }}" >> "$GITHUB_OUTPUT"
            echo "env_label=STAGING" >> "$GITHUB_OUTPUT"
          else
            echo "branch=main" >> "$GITHUB_OUTPUT"
            echo "api_url=${{ vars.PROD_API_URL }}" >> "$GITHUB_OUTPUT"
            echo "env_label=PRODUCTION" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate API URL
        working-directory: .
        run: |
          API_URL="${{ steps.env-config.outputs.api_url }}"
          if [ -z "$API_URL" ]; then
            echo "::error::Missing API URL for ${{ steps.env-config.outputs.env_label }}. Set vars.STAGING_API_URL or vars.PROD_API_URL in GitHub environment settings."
            exit 1
          fi
          echo "Target: ${{ steps.env-config.outputs.env_label }} → $API_URL"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.env-config.outputs.branch }}

      # ── Xcode / iOS SDK setup (App Store requirement) ──
      - name: Setup latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print Xcode + iOS SDK versions
        run: |
          xcodebuild -version
          echo "iPhoneOS SDK: $(xcrun --sdk iphoneos --show-sdk-version)"

      - name: Enforce minimum iOS SDK 26+
        run: |
          SDK_VERSION="$(xcrun --sdk iphoneos --show-sdk-version)"
          SDK_MAJOR="${SDK_VERSION%%.*}"
          if [ "${SDK_MAJOR}" -lt 26 ]; then
            echo "::error::iPhoneOS SDK ${SDK_VERSION} detected. App Store requires iOS SDK 26+."
            exit 1
          fi
          echo "SDK requirement satisfied: iOS SDK ${SDK_VERSION}"

      # ── Flutter setup ──
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Validate SLM download configuration
        env:
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
          SLM_MODEL_URL: ${{ secrets.SLM_MODEL_URL }}
        run: |
          if [[ -z "$HUGGINGFACE_TOKEN" && -z "$SLM_MODEL_URL" ]]; then
            echo "::error::Missing SLM download config: set HUGGINGFACE_TOKEN or SLM_MODEL_URL."
            exit 1
          fi
          if [[ -n "$SLM_MODEL_URL" ]]; then
            case "$SLM_MODEL_URL" in
              http://*|https://*) ;;
              *)
                echo "::error::SLM_MODEL_URL must be an absolute http(s) URL."
                exit 1
                ;;
            esac
          fi
          echo "SLM download configuration is valid"

      - name: Backend health precheck
        run: |
          API_URL="${{ steps.env-config.outputs.api_url }}"
          HEALTH_URL="${API_URL%/}/health"
          echo "Checking ${{ steps.env-config.outputs.env_label }} backend health: $HEALTH_URL"
          curl -fsS --connect-timeout 5 --max-time 15 "$HEALTH_URL" >/dev/null || {
            echo "::error::Backend not reachable on $HEALTH_URL"
            exit 1
          }
          echo "Backend health precheck OK"

      # ── Pre-build Flutter iOS (generates Xcode project + runs pod install) ──
      - name: Flutter build iOS (no codesign)
        env:
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
          SLM_MODEL_URL: ${{ secrets.SLM_MODEL_URL }}
        run: |
          API_URL="${{ steps.env-config.outputs.api_url }}"
          EXTRA_DEFINES=""
          if [[ -n "$HUGGINGFACE_TOKEN" ]]; then
            EXTRA_DEFINES="$EXTRA_DEFINES --dart-define=HUGGINGFACE_TOKEN=$HUGGINGFACE_TOKEN"
          fi
          if [[ -n "$SLM_MODEL_URL" ]]; then
            EXTRA_DEFINES="$EXTRA_DEFINES --dart-define=SLM_MODEL_URL=$SLM_MODEL_URL"
          fi
          if [[ -n "${{ secrets.SENTRY_DSN_MOBILE }}" ]]; then
            EXTRA_DEFINES="$EXTRA_DEFINES --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN_MOBILE }}"
          fi
          flutter build ios --release --no-codesign --dart-define=API_BASE_URL=$API_URL $EXTRA_DEFINES

      - name: Prepare DART_DEFINES for Xcode/Fastlane
        env:
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
          SLM_MODEL_URL: ${{ secrets.SLM_MODEL_URL }}
        run: |
          API_URL="${{ steps.env-config.outputs.api_url }}"
          defines=("API_BASE_URL=$API_URL")
          if [[ -n "$HUGGINGFACE_TOKEN" ]]; then
            defines+=("HUGGINGFACE_TOKEN=$HUGGINGFACE_TOKEN")
          fi
          if [[ -n "$SLM_MODEL_URL" ]]; then
            defines+=("SLM_MODEL_URL=$SLM_MODEL_URL")
          fi

          encoded_list=()
          for def in "${defines[@]}"; do
            encoded_list+=("$(printf '%s' "$def" | base64 | tr -d '\n')")
          done

          joined="$(IFS=,; echo "${encoded_list[*]}")"
          echo "DART_DEFINES=$joined" >> "$GITHUB_ENV"

      # ── Ruby + Fastlane ──
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: apps/mobile/ios

      - name: Install Fastlane
        working-directory: apps/mobile/ios
        run: bundle install

      - name: Validate App Store secrets
        working-directory: apps/mobile/ios
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          key_id="${APP_STORE_CONNECT_API_KEY_ID:-${APP_STORE_KEY_ID:-${ASC_KEY_ID:-}}}"
          issuer_id="${APP_STORE_CONNECT_ISSUER_ID:-${APP_STORE_ISSUER_ID:-${ASC_ISSUER_ID:-}}}"
          key_content="${APP_STORE_CONNECT_API_KEY_CONTENT:-${APP_STORE_CONNECT_API_KEY:-${APP_STORE_CONNECT_PRIVATE_KEY:-${ASC_API_KEY_CONTENT:-}}}}"
          [[ -n "$key_id" ]] || { echo "::error::Missing secret: APP_STORE_CONNECT_API_KEY_ID (or APP_STORE_KEY_ID/ASC_KEY_ID)"; exit 1; }
          [[ -n "$issuer_id" ]] || { echo "::error::Missing secret: APP_STORE_CONNECT_ISSUER_ID (or APP_STORE_ISSUER_ID/ASC_ISSUER_ID)"; exit 1; }
          [[ -n "$key_content" ]] || { echo "::error::Missing secret: APP_STORE_CONNECT_API_KEY_CONTENT (or APP_STORE_CONNECT_API_KEY/APP_STORE_CONNECT_PRIVATE_KEY/ASC_API_KEY_CONTENT)"; exit 1; }
          echo "App Store secrets precheck: OK"

      # ── Fastlane: sign + upload ──
      - name: "Build & Upload to TestFlight (${{ steps.env-config.outputs.env_label }})"
        working-directory: apps/mobile/ios
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          DART_DEFINES: ${{ env.DART_DEFINES }}
          CI: "true"
        run: bundle exec fastlane beta
