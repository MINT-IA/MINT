# MINT iOS — Build + Upload to TestFlight
# Triggers: merged PR to main (only if Flutter code changed)
# Also: manual trigger (workflow_dispatch) for on-demand builds
#
# NOTE: Direct pushes to main do NOT trigger this workflow.
# Use feature branches + PR merge, or workflow_dispatch for manual builds.
#
# Required GitHub Secrets:
#   APP_STORE_CONNECT_API_KEY_ID
#   APP_STORE_CONNECT_ISSUER_ID
#   APP_STORE_CONNECT_API_KEY_CONTENT  (base64-encoded .p8 file)
#   MATCH_GIT_URL                      (private repo for certs)
#   MATCH_PASSWORD                     (decrypt certs)

name: TestFlight

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - "apps/mobile/**"
  workflow_dispatch:  # Manual trigger from GitHub UI

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    name: Build iOS + Upload TestFlight
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true)
    runs-on: macos-15
    timeout-minutes: 45

    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      # ── Flutter setup ──
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      # ── Pre-build Flutter iOS (generates Xcode project + runs pod install) ──
      - name: Flutter build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      # ── Ruby + Fastlane ──
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: apps/mobile/ios

      - name: Install Fastlane
        working-directory: apps/mobile/ios
        run: bundle install

      - name: Validate App Store secrets
        working-directory: apps/mobile/ios
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          key_id="${APP_STORE_CONNECT_API_KEY_ID:-${APP_STORE_KEY_ID:-${ASC_KEY_ID:-}}}"
          issuer_id="${APP_STORE_CONNECT_ISSUER_ID:-${APP_STORE_ISSUER_ID:-${ASC_ISSUER_ID:-}}}"
          key_content="${APP_STORE_CONNECT_API_KEY_CONTENT:-${APP_STORE_CONNECT_API_KEY:-${APP_STORE_CONNECT_PRIVATE_KEY:-${ASC_API_KEY_CONTENT:-}}}}"
          [[ -n "$key_id" ]] || { echo "::error::Missing secret: APP_STORE_CONNECT_API_KEY_ID (or APP_STORE_KEY_ID/ASC_KEY_ID)"; exit 1; }
          [[ -n "$issuer_id" ]] || { echo "::error::Missing secret: APP_STORE_CONNECT_ISSUER_ID (or APP_STORE_ISSUER_ID/ASC_ISSUER_ID)"; exit 1; }
          [[ -n "$key_content" ]] || { echo "::error::Missing secret: APP_STORE_CONNECT_API_KEY_CONTENT (or APP_STORE_CONNECT_API_KEY/APP_STORE_CONNECT_PRIVATE_KEY/ASC_API_KEY_CONTENT)"; exit 1; }
          echo "App Store secrets precheck: OK"

      # ── Fastlane: sign + upload ──
      - name: Build & Upload to TestFlight
        working-directory: apps/mobile/ios
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          CI: "true"
        run: bundle exec fastlane beta
