# MINT Backend — Fly.io configuration
# Docs: https://fly.io/docs/reference/configuration/
#
# First deploy:
#   cd services/backend
#   fly launch --name mint-api --region cdg --no-deploy
#   fly secrets set JWT_SECRET_KEY="$(openssl rand -hex 32)"
#   fly secrets set ENVIRONMENT=production
#   fly secrets set DATABASE_URL="postgres://..."
#   fly deploy

app = "mint-api"
primary_region = "cdg"  # Paris — closest to Switzerland

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"   # Scale to zero when idle (saves $$$)
  auto_start_machines = true       # Wake on request
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/api/v1/health"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
