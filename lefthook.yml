# lefthook.yml — Phase 34 Wave 0 schema fix (GUARD-01) + Plan 02 flip
# Schema migration: top-level `skip:` was invalid in lefthook 2.1.x
# (rejected by `lefthook validate`). Moved under `pre-commit:` block.
# 30.5 D-01 skeleton preserved verbatim (memory-retention-gate +
# map-freshness-hint). Phase 34 Plans 01-07 add 5 new lints on top.
# Plan 02 flipped parallel (see `pre-commit` block) once no-bare-catch
# (read-only lint) landed per RESEARCH Pattern 6.

min_version: 2.1.5

pre-commit:
  # Phase 34 Plan 02 — flipped to true per RESEARCH Pattern 6. All 5 Phase 34
  # commands (memory-retention-gate, map-freshness-hint, accent-lint-fr,
  # no-bare-catch, + future GUARD-03/05 lints) are read-only: they invoke
  # `git diff --staged` / file reads / regex only. Zero `.git/index.lock`
  # contention. Exit code = max across commands (lefthook 2.1.x semantics).
  parallel: true
  skip:
    - merge
    - rebase
  commands:
    memory-retention-gate:
      run: python3 tools/checks/memory_retention.py
      tags: [memory, phase-30.5]
    map-freshness-hint:
      run: python3 tools/checks/map_freshness_hint.py {staged_files}
      glob: "*.{dart,py}"
      tags: [map, agents]
    # ─── Phase 34 GUARD-04 (D-11 canonical 14 patterns, D-12 scope) ───
    # Scans staged .dart, .py, .arb for ASCII-flattened FR accents.
    # Exclusions (D-12 + Pitfall 7):
    #  - 5 non-FR ARBs (en/de/es/it/pt) — no FR accents to enforce there.
    #  - tests/checks/fixtures/** — Wave 0 fixtures contain deliberate bad
    #    accents as test input.
    #  - tools/mcp/mint-tools/tests/** — Phase 30.7 TOOL-04 parametrize
    #    cases MUST contain the ASCII-flattened CLAUDE.md §2 stems verbatim
    #    as test inputs to assert scan_text fires. Scanning them would be
    #    Pitfall 7 (self-regression via legitimate test data).
    #  - tests/checks/test_accent_lint_fr.py — this lint's own pytest
    #    suite contains ASCII stems in its canonical set assertions.
    accent-lint-fr:
      run: |
        rc=0
        for f in {staged_files}; do
          python3 tools/checks/accent_lint_fr.py --file "$f" || rc=1
        done
        exit $rc
      glob: "*.{dart,py,arb}"
      exclude:
        - "apps/mobile/lib/l10n/app_en.arb"
        - "apps/mobile/lib/l10n/app_de.arb"
        - "apps/mobile/lib/l10n/app_es.arb"
        - "apps/mobile/lib/l10n/app_it.arb"
        - "apps/mobile/lib/l10n/app_pt.arb"
        - "tests/checks/fixtures/**"
        - "tests/checks/test_accent_lint_fr.py"
        - "tools/mcp/mint-tools/tests/**"
      tags: [i18n, phase-34]
    # ─── Phase 34 GUARD-02 (diff-only, D-05/D-06/D-07) ───────────────────
    # Scans ONLY the lines added by the staged diff (D-07) -- decouples
    # Phase 34 from Phase 36 FIX-05 migration of 388 existing bare-catches.
    # Dart `} catch (e) {}` + Python `except Exception: pass` without
    # log/rethrow. Exemptions: test/integration_test paths, async *
    # generators, inline `// lefthook-allow:bare-catch: <reason>` (>=3 words).
    # `exclude:` is belt-and-braces for the 4 D-06 authorised path prefixes;
    # the lint's `is_exempt_path()` also rejects them for pytest independence.
    # No broad `tests/**` exclude (W1 guard).
    no-bare-catch:
      run: python3 tools/checks/no_bare_catch.py --staged
      glob: "*.{dart,py}"
      exclude:
        - "apps/mobile/test/**"
        - "apps/mobile/integration_test/**"
        - "services/backend/tests/**"
        - "tests/checks/fixtures/**"
      tags: [safety, phase-34]
    # ─── Phase 34 GUARD-03 (D-08 glob-scoped, D-09 patterns, D-10 override) ──
    # D-08: glob restricts to widgets/screens/features only -- lib/models,
    # lib/services, lib/l10n, test, integration_test stay out of scope
    # (full-repo i18n audit = Phase 36 FIX-06). The Python script's
    # DEFAULT_SCOPE remains broader for manual `--scope` audits.
    # D-09: catches Text('<capitalised>...'), Text('<accented>'),
    # title: / label: named-args, plus fallback 2-FR-function-words heuristic.
    # Whitelist: short acronyms (<=5 chars), numeric strings.
    # D-10: inline override `// lefthook-allow:hardcoded-fr: <3+ words>` on
    # preceding line (mirrors Plan 34-02 no_bare_catch semantics).
    # fixtures/** excluded per Pitfall 7 (legitimate FR test inputs).
    no-hardcoded-fr:
      run: python3 tools/checks/no_hardcoded_fr.py --file {staged_files}
      glob: "apps/mobile/lib/{widgets,screens,features}/**/*.dart"
      exclude:
        - "tests/checks/fixtures/**"
      tags: [i18n, phase-34]
    # ─── Phase 34 GUARD-05 (D-13 key-set parity + placeholder parity, D-14 stdlib-only) ───
    # Triggered any time an ARB file is staged under apps/mobile/lib/l10n/.
    # Runs the FULL 6-file cross-language parity check -- the lint must
    # examine every language regardless of which ARB was staged, because
    # drift is a cross-file property (one language dropping a key is a
    # 6-file-wide fail). No {staged_files} expansion: the script scans the
    # whole lib/l10n/ directory in one pass. Fixtures excluded per Pitfall 7.
    # D-15: dead Dart-side orphan keys are out of scope (Phase 36 v2.9 cleanup).
    arb-parity:
      run: python3 tools/checks/arb_parity.py
      glob: "apps/mobile/lib/l10n/app_*.arb"
      exclude:
        - "tests/checks/fixtures/**"
      tags: [i18n, phase-34]
    # ─── Phase 34 GUARD-08 migrations (CI-first → lefthook-first, D-23) ───
    # These 4 lints previously ran only in CI (ci.yml lines 161/207/211/448).
    # Now they run locally pre-commit + in CI via lefthook-ci.yml (D-24) as
    # the PRIMARY ground-truth bypass catcher. Invocation form: zero args —
    # each script auto-scans its own configured scope (no --file per D-23
    # RESEARCH §Example 1). Triggered only when the `glob:` filter matches
    # a staged file — most commits skip these instantly (lefthook runs the
    # script on each command only when any staged path matches the glob).
    no-chiffre-choc:
      # Glob intentionally narrowed to code extensions (dart/py/arb) only.
      # Including .md would fire the full-repo scan on any README/docs edit
      # — the script has no --file arg (D-23 scope is self-configured:
      # apps/mobile/lib + services/backend/app + docs/ + tools/openapi)
      # so each invocation is ~1-2s cold, far slower on iCloud-synced dirs.
      # Doc .md files are still covered by lefthook-ci.yml (D-24) which
      # re-runs the full script on PR range on clean CI runners.
      run: python3 tools/checks/no_chiffre_choc.py
      glob: "*.{dart,py,arb}"
      exclude:
        - "tests/checks/fixtures/**"
      tags: [safety, phase-34, migrated]
    landing-no-numbers:
      run: python3 tools/checks/landing_no_numbers.py
      glob: "apps/mobile/lib/screens/landing/**/*.dart"
      tags: [safety, phase-34, migrated]
    landing-no-financial-core:
      run: python3 tools/checks/landing_no_financial_core.py
      glob: "apps/mobile/lib/screens/landing/**/*.dart"
      tags: [safety, phase-34, migrated]
    route-registry-parity:
      run: python3 tools/checks/route_registry_parity.py
      glob: "apps/mobile/lib/{app.dart,routes/route_metadata.dart}"
      tags: [maps, phase-34, migrated]

# ─── Phase 34 GUARD-06 proof-of-read (commit-msg hook) ────────────────────
# D-04 AMENDED by CONTEXT D-27 (Plan 34-05 + RESEARCH Open Question 1
# Option A): Phase 34 authorises EXACTLY ONE `commit-msg:` block,
# dedicated to proof-of-read. No other lint migrates to commit-msg; all
# GUARD-01..05/07/08 lints stay pre-commit.
#
# Rationale: D-17 requires access to the commit message text. Pre-commit
# runs before the message is typed; post-commit runs after the commit is
# written to history. Only `commit-msg` fires at the right moment with
# `.git/COMMIT_EDITMSG` accessible via the `{1}` placeholder.
#
# Scope discipline: this block contains exactly ONE command. Do NOT add
# other lints here. Future commit-msg lints require a new CONTEXT
# amendment on top of D-27.
commit-msg:
  commands:
    proof-of-read:
      # {1} = path to .git/COMMIT_EDITMSG (lefthook 2.1.6 placeholder
      # convention). Human commits (no Co-Authored-By: Claude trailer)
      # bypass automatically per D-17.
      run: python3 tools/checks/proof_of_read.py --commit-msg-file {1}
      tags: [agents, proof-of-read, phase-34]
